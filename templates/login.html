{% extends "base.html" %}
{% block title %}Anmelden · FamBank{% endblock %}
{% block content %}
<div class="login-card">
  <div class="login-logo">🏦</div>
  <h1>FamBank</h1>
  <p class="sub">Taschengeld · Aufgaben · Lernen</p>

  {% if flash %}<div class="flash {{ flash.kind }}">{{ flash.msg }}</div>{% endif %}

  <form method="post" action="/login">
    <label>Benutzername
      <input name="username" autocomplete="username" autocapitalize="none" required autofocus data-allow-pw>
    </label>
    <label>Passwort
      <input name="password" type="password" autocomplete="current-password" required data-allow-pw>
    </label>
    <button type="submit">Anmelden</button>
  </form>
</div>
{% endblock %}
